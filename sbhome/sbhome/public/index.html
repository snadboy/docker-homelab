<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #151515;
            --surface-elevated: #1f1f1f;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-tertiary: #6b6b6b;
            --accent: #00ff41;
            --accent-dim: #00cc34;
            --warning: #ff9500;
            --static-color: #00d4ff;
            --container-color: #ff6b6b;
            --unifi-color: #0096ff;
            --kvm-color: #ff00ff;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            position: relative;
            padding: 4rem 0 2rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--bg) 0%, var(--surface) 100%);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent) 0%, var(--static-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--surface);
            border-radius: 4px;
            border-left: 3px solid var(--accent);
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            font-weight: 600;
        }

        /* Tabs */
        .tabs-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 1.5rem 0 0;
            border-bottom: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--surface);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-badge {
            display: inline-block;
            margin-left: 0.5rem;
            padding: 0.125rem 0.5rem;
            font-size: 0.625rem;
            font-weight: 700;
            border-radius: 10px;
            background: var(--surface);
            font-variant-numeric: tabular-nums;
        }

        .tab.active .tab-badge {
            background: var(--accent);
            color: var(--bg);
        }

        /* Search */
        .search-container {
            padding: 1.5rem 0;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 255, 65, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Service Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .service-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .service-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 255, 65, 0.1);
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card.static::before {
            background: var(--static-color);
        }

        .service-card.static:hover {
            border-color: var(--static-color);
        }

        .service-card.unifi::before {
            background: var(--unifi-color);
        }

        .service-card.unifi:hover {
            border-color: var(--unifi-color);
        }

        .service-card.kvm::before {
            background: var(--kvm-color);
        }

        .service-card.kvm:hover {
            border-color: var(--kvm-color);
        }

        .service-name {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .health-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .health-indicator.healthy {
            background: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
        }

        .health-indicator.unhealthy {
            background: #ff4444;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.6);
        }

        .health-indicator.unknown {
            background: #888;
            box-shadow: none;
        }

        .health-indicator.checking {
            background: #ffaa00;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .service-domain {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
            margin-bottom: 0.5rem;
        }

        .service-domain a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .service-domain a:hover {
            color: var(--accent);
        }

        .service-card.static .service-domain a:hover {
            color: var(--static-color);
        }

        .service-card.unifi .service-domain a:hover {
            color: var(--unifi-color);
        }

        .service-card.kvm .service-domain a:hover {
            color: var(--kvm-color);
        }

        .service-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 3px;
            border: 1px solid;
        }

        .badge.static {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--static-color);
            color: var(--static-color);
        }

        .badge.container {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--container-color);
            color: var(--container-color);
        }

        .badge.local {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .badge.insecure {
            background: rgba(255, 149, 0, 0.1);
            border-color: var(--warning);
            color: var(--warning);
        }

        .badge.unifi {
            background: rgba(0, 150, 255, 0.1);
            border-color: var(--unifi-color);
            color: var(--unifi-color);
        }

        .service-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .detail-row {
            display: flex;
            gap: 0.5rem;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-tertiary);
            min-width: 70px;
        }

        .detail-value {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 0.8125rem;
            word-break: break-all;
        }

        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .no-results-text {
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            color: var(--text-tertiary);
            text-align: center;
            font-size: 0.875rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(0, 255, 65, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 255, 65, 0.4), 0 0 30px rgba(0, 255, 65, 0.2);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Service cards staggered entrance */
        .service-card {
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .service-card:nth-child(1) { animation-delay: 0.05s; }
        .service-card:nth-child(2) { animation-delay: 0.1s; }
        .service-card:nth-child(3) { animation-delay: 0.15s; }
        .service-card:nth-child(4) { animation-delay: 0.2s; }
        .service-card:nth-child(5) { animation-delay: 0.25s; }
        .service-card:nth-child(6) { animation-delay: 0.3s; }
        .service-card:nth-child(7) { animation-delay: 0.35s; }
        .service-card:nth-child(8) { animation-delay: 0.4s; }
        .service-card:nth-child(9) { animation-delay: 0.45s; }
        .service-card:nth-child(10) { animation-delay: 0.5s; }

        /* Tab indicator slide */
        .tab {
            position: relative;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--accent);
            transform: translateX(-50%);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab.active::after {
            width: 100%;
        }

        /* Tab badge pulse on active */
        .tab.active .tab-badge {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Search input focus glow */
        .search-input:focus {
            animation: glow 2s ease-in-out infinite;
        }

        /* Stat value entrance */
        .stat-value {
            animation: countUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        .stat:nth-child(1) .stat-value { animation-delay: 0.1s; }
        .stat:nth-child(2) .stat-value { animation-delay: 0.2s; }
        .stat:nth-child(3) .stat-value { animation-delay: 0.3s; }

        /* Badge shimmer effect */
        .badge {
            position: relative;
            overflow: hidden;
        }

        .badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            background-size: 200% 100%;
            animation: shimmer 4s infinite;
        }

        /* Header title entrance */
        h1 {
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .subtitle {
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        .stats {
            animation: fadeInUp 0.6s ease-out 0.4s backwards;
        }

        @media (max-width: 768px) {
            .services-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>

    <header>
        <div class="container">
            <h1>Infrastructure</h1>
            <div class="subtitle">Complete view of routes, devices, and systems</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-count">49</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="visible-count">49</div>
                    <div class="stat-label">Visible</div>
                </div>
            </div>
        </div>
    </header>

    <div class="tabs-container">
        <div class="container">
            <div class="tabs">
                <button class="tab active" data-tab="docker-routes">
                    Docker Routes <span class="tab-badge">26</span>
                </button>
                <button class="tab" data-tab="static-routes">
                    Static Routes <span class="tab-badge">13</span>
                </button>
                <button class="tab" data-tab="unifi-devices">
                    UniFi Devices <span class="tab-badge">10</span>
                </button>
                <button class="tab" data-tab="kvm-devices">
                    KVM Devices <span class="tab-badge">0</span>
                </button>
                <button class="tab" data-tab="network">
                    Network <span class="tab-badge">—</span>
                </button>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="search-container">
            <input
                type="text"
                class="search-input"
                id="search"
                placeholder="Search by name, IP, domain, or host..."
                autocomplete="off"
            >
        </div>

        <!-- Docker Routes Tab -->
        <div class="tab-content active" id="docker-routes">
            <div class="services-grid" id="docker-grid"></div>
            <div class="no-results" id="docker-no-results" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">No Docker routes found</div>
            </div>
        </div>

        <!-- Static Routes Tab -->
        <div class="tab-content" id="static-routes">
            <div class="services-grid" id="static-grid"></div>
            <div class="no-results" id="static-no-results" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">No static routes found</div>
            </div>
        </div>

        <!-- UniFi Devices Tab -->
        <div class="tab-content" id="unifi-devices">
            <div class="services-grid" id="unifi-grid"></div>
            <div class="no-results" id="unifi-no-results" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">No UniFi devices found</div>
            </div>
        </div>

        <!-- KVM Devices Tab -->
        <div class="tab-content" id="kvm-devices">
            <div class="services-grid" id="kvm-grid"></div>
            <div class="no-results" id="kvm-no-results" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">No KVM devices found</div>
            </div>
        </div>

        <!-- Network Tab -->
        <div class="tab-content" id="network">
            <div id="network-dashboard">
                <!-- Top Stats Cards -->
                <div class="services-grid" id="network-stats-grid"></div>

                <!-- Access Points Section -->
                <div style="margin-top: 2rem;">
                    <h3 style="color: var(--text-primary); margin-bottom: 1rem; font-size: 1.25rem;">Access Points</h3>
                    <div class="services-grid" id="network-aps-grid"></div>
                </div>

                <!-- Top Clients Section -->
                <div style="margin-top: 2rem;">
                    <h3 style="color: var(--text-primary); margin-bottom: 1rem; font-size: 1.25rem;">Top Clients by Bandwidth</h3>
                    <div id="network-top-clients"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            Infrastructure Dashboard — Powered by Traefik HTTP Provider & UniFi API
        </div>
    </footer>

                            <span class="detail-label">Hostname:</span>
                            <span class="detail-value">${device.hostname}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">IP:</span>
                            <span class="detail-value">${device.ip}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            document.getElementById('docker-grid').innerHTML = containerServices.map(renderService).join('');
            document.getElementById('static-grid').innerHTML = staticServices.map(renderService).join('');
            document.getElementById('unifi-grid').innerHTML = UNIFI_DATA.map(renderUnifiDevice).join('');
            // KVM grid is rendered separately after API fetch
        }

        function filterServices(query) {
            const searchTerm = query.toLowerCase();
            const cards = document.querySelectorAll('.service-card');

            let visibleCount = 0;

            cards.forEach(card => {
                const searchData = card.getAttribute('data-search')?.toLowerCase() || '';
                const isVisible = !searchTerm || searchData.includes(searchTerm);
                card.style.display = isVisible ? 'block' : 'none';

                if (isVisible) visibleCount++;
            });

            // Update no results messages
            updateNoResults('docker', containerServices.length);
            updateNoResults('static', staticServices.length);
            updateNoResults('unifi', UNIFI_DATA.length);
            updateNoResults('kvm', KVM_DATA.length);

            document.getElementById('visible-count').textContent = visibleCount;
        }

        function updateNoResults(type, totalCount) {
            const grid = document.getElementById(`${type}-grid`);
            const noResults = document.getElementById(`${type}-no-results`);
            const visibleCards = Array.from(grid.querySelectorAll('.service-card')).filter(c => c.style.display !== 'none');

            if (visibleCards.length === 0 && totalCount > 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                noResults.style.display = 'none';
            }
        }

        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

            currentTab = tabId;
        }

        // Fetch KVM devices from API
        async function loadKvmDevices() {
            try {
                const response = await fetch('/api/kvm/devices');
                if (response.ok) {
                    const devices = await response.json();
                    KVM_DATA = devices;

                    // Update tab badge
                    const kvmTab = document.querySelector('[data-tab="kvm-devices"]');
                    const badge = kvmTab.querySelector('.tab-badge');
                    badge.textContent = KVM_DATA.length;

                    // Re-render KVM grid
                    renderKvmGrid();

                    // Update totals
                    updateTotals();
                }
            } catch (error) {
                console.error('Failed to load KVM devices:', error);
            }
        }

        function renderKvmGrid() {
            const grid = document.getElementById('kvm-grid');
            if (KVM_DATA.length > 0) {
                grid.innerHTML = KVM_DATA.map(renderKvmDevice).join('');
            } else {
                grid.innerHTML = '<div class="no-results"><div class="no-results-icon">📡</div><div class="no-results-text">No KVM devices configured</div></div>';
            }
        }

        function updateTotals() {
            const totalCount = containerServices.length + staticServices.length + UNIFI_DATA.length + KVM_DATA.length;
            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('visible-count').textContent = totalCount;
        }

        // Fetch health status from API
        async function loadHealthStatus() {
            try {
                const response = await fetch('/api/health/status');
                if (response.ok) {
                    HEALTH_STATUS = await response.json();
                    updateHealthIndicators();
                }
            } catch (error) {
                console.error('Failed to load health status:', error);
            }
        }

        // Update health indicators in the DOM
        function updateHealthIndicators() {
            document.querySelectorAll('.service-card').forEach(card => {
                const healthId = card.getAttribute('data-health-id');
                if (!healthId) return;

                const indicator = card.querySelector('.health-indicator');
                if (!indicator) return;

                const healthClass = getHealthStatus(healthId);
                indicator.className = `health-indicator ${healthClass}`;
            });
        }

        // Start periodic health status updates (every 60 seconds)
        function startHealthMonitoring() {
            // Initial load
            loadHealthStatus();

            // Refresh every 60 seconds
            setInterval(loadHealthStatus, 60000);
        }

        // Network Dashboard Functions
        let NETWORK_STATS = null;

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
        }

        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            if (days > 0) return `${days}d ${hours}h`;
            return `${hours}h`;
        }

        async function loadNetworkStats() {
            try {
                const response = await fetch('/api/network/unifi/stats');
                if (response.ok) {
                    NETWORK_STATS = await response.json();
                    renderNetworkDashboard();

                    // Update Network tab badge with client count
                    const networkTab = document.querySelector('[data-tab="network"]');
                    const badge = networkTab.querySelector('.tab-badge');
                    badge.textContent = NETWORK_STATS.total_clients || 0;
                }
            } catch (error) {
                console.error('Failed to load network stats:', error);
            }
        }

        function startNetworkMonitoring() {
            // Initial load
            loadNetworkStats();

            // Refresh every 60 seconds
            setInterval(loadNetworkStats, 60000);
        }

        function renderNetworkDashboard() {
            if (!NETWORK_STATS) return;

            renderNetworkStatCards();
            renderAccessPoints();
            renderTopClients();
        }

        function renderNetworkStatCards() {
            const stats = NETWORK_STATS;
            const gateway = stats.gateway || {};

            const statsHTML = `
                <div class="service-card">
                    <div class="service-name">🖥️ Gateway</div>
                    <div class="service-domain">${gateway.model || 'Unknown'}</div>
                    <div class="service-details">
                        <div class="detail-row">
                            <span class="detail-label">CPU:</span>
                            <span class="detail-value">${gateway.cpu?.toFixed(1) || 0}%</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">RAM:</span>
                            <span class="detail-value">${gateway.mem?.toFixed(1) || 0}%</span>
                        </div>
                    </div>
                </div>
                <div class="service-card">
                    <div class="service-name">🌐 WAN Status</div>
                    <div class="service-domain" style="color: var(--accent);">🟢 Online</div>
                    <div class="service-details">
                        <div class="detail-row">
                            <span class="detail-label">Uptime:</span>
                            <span class="detail-value">${formatUptime(gateway.uptime || 0)}</span>
                        </div>
                    </div>
                </div>
                <div class="service-card">
                    <div class="service-name">👥 Clients</div>
                    <div class="service-domain">${stats.total_clients || 0}</div>
                    <div class="service-details">
                        <div class="detail-row">
                            <span class="detail-value">${stats.wireless_clients || 0}W / ${stats.wired_clients || 0}E</span>
                        </div>
                    </div>
                </div>
                <div class="service-card">
                    <div class="service-name">📶 UniFi Devices</div>
                    <div class="service-domain">${stats.total_devices || 0}</div>
                    <div class="service-details">
                        <div class="detail-row">
                            <span class="detail-value">${stats.aps || 0} APs / ${stats.switches || 0} SW</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('network-stats-grid').innerHTML = statsHTML;
        }

        function renderAccessPoints() {
            const aps = NETWORK_STATS?.ap_details || [];

            if (aps.length === 0) {
                document.getElementById('network-aps-grid').innerHTML = '<div class="no-results"><div class="no-results-text">No access points found</div></div>';
                return;
            }

            const apsHTML = aps.map(ap => `
                <div class="service-card">
                    <div class="service-name">${ap.name}</div>
                    <div class="service-domain">${ap.num_sta || 0} clients</div>
                    <div class="service-badges">
                        <span class="badge unifi">${ap.model}</span>
                    </div>
                    <div class="service-details">
                        <div class="detail-row">
                            <span class="detail-label">IP:</span>
                            <span class="detail-value">${ap.ip}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Uptime:</span>
                            <span class="detail-value">${formatUptime(ap.uptime || 0)}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('network-aps-grid').innerHTML = apsHTML;
        }

        function renderTopClients() {
            const clients = NETWORK_STATS?.top_clients || [];

            if (clients.length === 0) {
                document.getElementById('network-top-clients').innerHTML = '<div class="no-results"><div class="no-results-text">No clients found</div></div>';
                return;
            }

            const clientsHTML = `
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    ${clients.map((client, index) => `
                        <div style="background: var(--surface); padding: 1rem; border-radius: 6px; border-left: 3px solid ${client.is_wired ? 'var(--accent)' : 'var(--unifi-color)'}; display: flex; align-items: center; gap: 1rem;">
                            <div style="min-width: 30px; text-align: center; font-weight: 700; color: var(--text-tertiary);">${index + 1}</div>
                            <div style="flex: 1;">
                                <div style="font-weight: 600; color: var(--text-primary);">${client.name}</div>
                                <div style="font-size: 0.875rem; color: var(--text-secondary);">${client.ip} · ${client.network}</div>
                            </div>
                            <div style="font-weight: 700; color: var(--accent);">${formatBytes(client.total_bytes)}</div>
                            <div style="font-size: 1.25rem;">${client.is_wired ? '🔌' : '📶'}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('network-top-clients').innerHTML = clientsHTML;
        }

        // Initialize
        renderAll();
        loadKvmDevices();
        startNetworkMonitoring();
        startHealthMonitoring();

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                switchTab(tab.getAttribute('data-tab'));
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            filterServices(e.target.value);
        });
    </script>
</body>
</html>
