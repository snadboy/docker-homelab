services:
  byos-trmnl:
    image: ghcr.io/snadboy/byos_trmnl:latest
    container_name: byos-trmnl
    restart: unless-stopped
    # Headless Chromium needs more than the default 64MB /dev/shm for X renders.
    shm_size: "1gb"
    environment:
      # The TRMNL panel is a plain LAN WiFi client (NOT a tailnet node), so this
      # must be LAN-reachable. host-utilities.isnadboy.com resolves via Technitium
      # to utilities' LAN IP (the ts.net service is unreachable to the panel).
      # Keep a DHCP reservation on utilities so that LAN IP stays stable.
      BYOS_BASE_URL: "http://host-utilities.isnadboy.com:2300"
      BYOS_DEFAULT_REFRESH_RATE: "900"
      TZ: "America/Chicago"
      # Proxmox API token for the pve_load plugin (values in .env, gitignored)
      PVE_TOKEN_ID: "${PVE_TOKEN_ID}"
      PVE_TOKEN_SECRET: "${PVE_TOKEN_SECRET}"
    volumes:
      - byos-trmnl-data:/app/data     # sqlite registry + playlists (persist)
    ports:
      - "2300:2300"                    # published for the LAN e-ink device
    labels:
      # DockTail → Tailscale Service for admin/browser access from the tailnet
      # (trmnl.swallow-spectrum.ts.net). The device does NOT use this.
      - "docktail.service.enable=true"
      - "docktail.service.name=trmnl"
      - "docktail.service.port=2300"
      - "docktail.service.service-port=443"

volumes:
  byos-trmnl-data:
    external: true
