all:
  children:
    pve_nodes:
      hosts:
        pve-colossus.tail65635.ts.net:
          ansible_user: root
        pve-guardian.tail65635.ts.net:
          ansible_user: root
        # pve-multivac: dormant indefinitely (Raptor Lake Vmin Shift suspected)
        pve-multivac.tail65635.ts.net:
          ansible_user: root
    pbs_servers:
      hosts:
        host-svalbard.isnadboy.com:
          ansible_user: root
        host-alexandria.isnadboy.com:
          ansible_user: root
    ubuntu_vms:
      hosts:
        host-arr.isnadboy.com:
          ansible_user: snadboy
        host-cadre.isnadboy.com:
          ansible_user: snadboy
        host-fetch.isnadboy.com:
          ansible_user: snadboy
        host-bedrock.isnadboy.com:
          ansible_user: snadboy
        host-utilities.isnadboy.com:
          ansible_user: snadboy
    workstations:
      # Physical / bare-metal Ubuntu hosts. Also run unattended-upgrades;
      # Ansible apt-update is a belt-and-braces layer for visibility.
      hosts:
        sdevs.tail65635.ts.net:
          ansible_user: snadboy
    managed_locally:
      # Hosts excluded from apt_hosts — updates handled by an external
      # mechanism (unattended-upgrades, DSM auto-update, etc.). Currently
      # empty after sdevs was promoted to workstations.
      hosts: {}
    debian_containers:
      hosts:
        host-ns.isnadboy.com:
          ansible_user: root
    lxc_containers:
      # Managed via pct exec delegated to parent PVE node (no SSH)
      hosts:
        ns-secundus:
          pve_host: pve-guardian.tail65635.ts.net
          pve_vmid: 108
        # ns-tertius: unreachable while pve-multivac is dormant
        ns-tertius:
          pve_host: pve-multivac.tail65635.ts.net
          pve_vmid: 112
        pve-scripts-local:
          pve_host: pve-colossus.tail65635.ts.net
          pve_vmid: 104
        plex-lxc:
          pve_host: pve-colossus.tail65635.ts.net
          pve_vmid: 107
    apt_hosts:
      children:
        pve_nodes:
        pbs_servers:
        ubuntu_vms:
        workstations:
        debian_containers:
  vars:
    ansible_become: true
    ansible_become_method: sudo
