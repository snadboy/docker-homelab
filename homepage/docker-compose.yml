services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3500:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - HOMEPAGE_VAR_TITLE=Homelab Dashboard
      - LOG_TARGETS=stdout
      - HOMEPAGE_ALLOWED_HOSTS=homepage.isnadboy.com

      # Secrets are pulled from .env (gitignored). See .env.example for the full list.
      - HOMEPAGE_VAR_PLEX_TOKEN=${HOMEPAGE_VAR_PLEX_TOKEN}
      - HOMEPAGE_VAR_TAUTULLI_KEY=${HOMEPAGE_VAR_TAUTULLI_KEY}
      - HOMEPAGE_VAR_OVERSEERR_KEY=${HOMEPAGE_VAR_OVERSEERR_KEY}
      - HOMEPAGE_VAR_SONARR_KEY=${HOMEPAGE_VAR_SONARR_KEY}
      - HOMEPAGE_VAR_RADARR_KEY=${HOMEPAGE_VAR_RADARR_KEY}
      - HOMEPAGE_VAR_PROWLARR_KEY=${HOMEPAGE_VAR_PROWLARR_KEY}
      - HOMEPAGE_VAR_SABNZBD_KEY=${HOMEPAGE_VAR_SABNZBD_KEY}
      - HOMEPAGE_VAR_HASS_TOKEN=${HOMEPAGE_VAR_HASS_TOKEN}
      - HOMEPAGE_VAR_PROXMOX_USER=${HOMEPAGE_VAR_PROXMOX_USER}
      - HOMEPAGE_VAR_PROXMOX_TOKEN=${HOMEPAGE_VAR_PROXMOX_TOKEN}
      - HOMEPAGE_VAR_PBS_ALEXANDRIA_USER=${HOMEPAGE_VAR_PBS_ALEXANDRIA_USER}
      - HOMEPAGE_VAR_PBS_ALEXANDRIA_TOKEN=${HOMEPAGE_VAR_PBS_ALEXANDRIA_TOKEN}
      - HOMEPAGE_VAR_PBS_SVALBARD_USER=${HOMEPAGE_VAR_PBS_SVALBARD_USER}
      - HOMEPAGE_VAR_PBS_SVALBARD_TOKEN=${HOMEPAGE_VAR_PBS_SVALBARD_TOKEN}
      - HOMEPAGE_VAR_GOTIFY_CLIENT_TOKEN=${HOMEPAGE_VAR_GOTIFY_CLIENT_TOKEN}
      - HOMEPAGE_VAR_TECHNITIUM_TOKEN=${HOMEPAGE_VAR_TECHNITIUM_TOKEN}
    volumes:
      - homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "snadboy.revp.3000.domain=homepage.isnadboy.com"
      - "docktail.service.enable=true"
      - "docktail.service.name=homepage"
      - "docktail.service.port=3000"
      - "docktail.service.service-port=443"

volumes:
  homepage-config:
    external: true
