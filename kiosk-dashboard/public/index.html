<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280,initial-scale=1">
<title>Homelab Strip</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header id="hdr">
	<div id="hdr-left">
		<div id="clock">--:--</div>
		<div id="date">—</div>
		<div id="temp">—</div>
	</div>
	<div id="view-name">starting…</div>
	<div id="hdr-right">
		<div id="dots"></div>
		<button id="prev-btn" type="button" class="nav-btn" aria-label="previous view" disabled>‹</button>
		<button id="pause-btn" type="button" aria-label="pause rotation">❚❚</button>
		<button id="next-btn" type="button" class="nav-btn" aria-label="next view" disabled>›</button>
	</div>
</header>
<main id="body">
	<div id="alerts-view" class="view">
		<div class="alerts-summary">
			<div class="big-num" id="alerts-count">–</div>
			<div class="alerts-label" id="alerts-label">monitors up</div>
			<div class="alerts-sub" id="alerts-sub"></div>
		</div>
		<ul id="alerts-list"></ul>
	</div>
	<div id="utilities-view" class="view metrics-view" data-host="utilities"></div>
	<div id="cadre-view" class="view metrics-view" data-host="cadre"></div>
	<div id="sdevs-view" class="view metrics-view" data-host="sdevs"></div>
	<div id="proxmox-view" class="view extras-view"></div>
	<div id="wifi-view" class="view extras-view"></div>
</main>
<footer id="ftr">
	<span id="alert-counter">0 down</span>
	<span id="last-update">–</span>
	<button id="settings-btn" type="button" aria-label="settings">⚙</button>
</footer>

<div id="settings-modal" hidden>
	<div class="settings-card">
		<div class="settings-title">Settings</div>

		<label class="settings-row">
			<span class="settings-label">View rotation</span>
			<select id="opt-rotation"></select>
		</label>

		<label class="settings-row">
			<span class="settings-label">Metrics poll interval</span>
			<select id="opt-metrics"></select>
		</label>

		<label class="settings-row">
			<span class="settings-label">Alerts poll interval</span>
			<select id="opt-alerts"></select>
		</label>

		<label class="settings-row">
			<span class="settings-label">Sparkline history window</span>
			<select id="opt-history"></select>
		</label>

		<div class="settings-actions">
			<button id="settings-reset" type="button" class="btn-secondary">Reset</button>
			<button id="settings-close" type="button" class="btn-primary">Close</button>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
