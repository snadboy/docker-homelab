services:
  container-watchdog:
    build: .
    image: container-watchdog:local
    container_name: container-watchdog
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('1.1.1.1', 53), timeout=3).close()"]
      interval: 60s
      timeout: 5s
      retries: 3
