all:
  children:
    pve_nodes:
      hosts:
        pve-colossus.tail65635.ts.net:
          ansible_user: root
        pve-guardian.tail65635.ts.net:
          ansible_user: root
        # pve-multivac: dormant indefinitely (Raptor Lake Vmin Shift suspected)
        pve-multivac.tail65635.ts.net:
          ansible_user: root
    pbs_servers:
      hosts:
        pbs-svalbard.tail65635.ts.net:
          ansible_user: root
        pbs-alexandria.tail65635.ts.net:
          ansible_user: root
    ubuntu_vms:
      hosts:
        arr.tail65635.ts.net:
          ansible_user: snadboy
        cadre.tail65635.ts.net:
          ansible_user: snadboy
        fetch.tail65635.ts.net:
          ansible_user: snadboy
        bedrock.tail65635.ts.net:
          ansible_user: snadboy
    workstations:
      # Physical / bare-metal Ubuntu hosts managed exclusively by Ansible
      # (unattended-upgrades disabled on these).
      hosts:
        sdevs.tail65635.ts.net:
          ansible_user: snadboy
    managed_locally:
      # Hosts excluded from apt_hosts — updates handled by unattended-upgrades
      # or another external mechanism. Tracked here for visibility.
      hosts:
        utilities.tail65635.ts.net:
          ansible_user: snadboy
          # utilities runs Semaphore itself; can't reliably SSH to self from
          # inside the container, and unattended-upgrades already patches it.
    lxc_containers:
      # Managed via pct exec delegated to parent PVE node (no SSH)
      hosts:
        ns:
          pve_host: pve-colossus.tail65635.ts.net
          pve_vmid: 103
        ns-secundus:
          pve_host: pve-guardian.tail65635.ts.net
          pve_vmid: 108
        # ns-tertius: unreachable while pve-multivac is dormant
        ns-tertius:
          pve_host: pve-multivac.tail65635.ts.net
          pve_vmid: 112
        pve-scripts-local:
          pve_host: pve-colossus.tail65635.ts.net
          pve_vmid: 104
        plex-lxc:
          pve_host: pve-colossus.tail65635.ts.net
          pve_vmid: 107
    apt_hosts:
      children:
        pve_nodes:
        pbs_servers:
        ubuntu_vms:
        workstations:
    dockhand_agents:
      # Hosts running the Hawser agent (Docker socket proxy for Dockhand).
      # Mix of ubuntu_vms, the colossus PVE node itself, and one LXC.
      # Update flow lives in playbooks/dockhand-update.yml and uses
      # SSH for non-LXC hosts, pct exec for plex-lxc.
      hosts:
        arr.tail65635.ts.net:
        cadre.tail65635.ts.net:
        fetch.tail65635.ts.net:
        bedrock.tail65635.ts.net:
        pve-colossus.tail65635.ts.net:
        plex-lxc:
    dockhand_server:
      # The Dockhand controller (compose stack on utilities). Single host,
      # updated via community.docker.docker_compose_v2 in the same
      # playbook as the hawser agents.
      hosts:
        utilities.tail65635.ts.net:
          ansible_user: snadboy
  vars:
    ansible_become: true
    ansible_become_method: sudo