---
# LXC variant: install via `pct exec` delegated to the parent PVE node.
# Mirrors the second play of ansible/playbooks/apt-update.yml.
# Containers in this group have no SSH; we drive everything from the host.
#
# Templates are rendered on the controller via the `template` lookup and
# base64-encoded to avoid shell-quoting issues inside `pct exec bash -c`.

- name: Install beszel-agent in LXC via pct exec
  delegate_to: "{{ pve_host }}"
  become: false
  vars:
    ansible_user: root
    _beszel_unit_b64: "{{ lookup('template', 'beszel-agent.service.j2') | b64encode }}"
    _beszel_env_b64: "{{ lookup('template', 'beszel-agent.env.j2') | b64encode }}"
  ansible.builtin.shell: |
    set -euo pipefail
    pct exec {{ pve_vmid }} -- bash -c '
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive

      case "$(uname -m)" in
        x86_64)  ARCH=amd64 ;;
        aarch64) ARCH=arm64 ;;
        armv7l)  ARCH=arm   ;;
        *)       echo "unsupported arch $(uname -m)"; exit 2 ;;
      esac

      INSTALLED=""
      if [ -x /opt/beszel-agent/beszel-agent ]; then
        INSTALLED=$(/opt/beszel-agent/beszel-agent --version 2>/dev/null || true)
      fi

      if ! echo "$INSTALLED" | grep -q "{{ beszel_agent_version }}"; then
        if ! command -v curl >/dev/null; then apt-get update -qq && apt-get install -y -qq curl; fi
        if ! command -v tar  >/dev/null; then apt-get install -y -qq tar; fi
        mkdir -p /opt/beszel-agent
        curl -fsSL "{{ beszel_agent_release_url }}" \
          | tar -xz -C /opt/beszel-agent --no-same-owner
        chmod 0755 /opt/beszel-agent/beszel-agent
      fi

      id beszel >/dev/null 2>&1 || \
        useradd --system --shell /usr/sbin/nologin --home-dir {{ beszel_agent_state_dir }} --no-create-home beszel

      if getent group docker >/dev/null; then
        usermod -aG docker beszel
      fi

      echo "{{ _beszel_env_b64 }}"  | base64 -d > /etc/default/beszel-agent
      chown root:beszel /etc/default/beszel-agent
      chmod 0640 /etc/default/beszel-agent

      echo "{{ _beszel_unit_b64 }}" | base64 -d > /etc/systemd/system/beszel-agent.service
      chmod 0644 /etc/systemd/system/beszel-agent.service

      systemctl daemon-reload
      systemctl enable beszel-agent
      systemctl restart beszel-agent
    '
  register: _beszel_lxc_install
  changed_when: true
