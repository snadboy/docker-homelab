services:
  kiosk-dashboard:
    image: caddy:2-alpine
    container_name: kiosk-dashboard
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/srv/public:ro
    labels:
      - "snadboy.revp.80.domain=kiosk.isnadboy.com"
    depends_on:
      - kiosk-data

  kiosk-data:
    build: ./sidecar
    container_name: kiosk-data
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
