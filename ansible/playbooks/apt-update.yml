- name: Apply system updates (SSH hosts)
  hosts: apt_hosts
  become: true
  gather_facts: true
  any_errors_fatal: false
  max_fail_percentage: 100
  tasks:
    - block:
        - name: Count security updates pending
          ansible.builtin.shell: |
            set -o pipefail
            apt-get -s -o Debug::NoLocking=true upgrade 2>/dev/null \
              | grep -E '^Inst .*security' | wc -l
          args:
            executable: /bin/bash
          register: sec_count
          changed_when: false
          failed_when: false

        - name: Update apt cache
          apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Upgrade all packages
          apt:
            upgrade: dist
            autoremove: true
            autoclean: true
          register: upgrade_result

        - name: Check if reboot required
          stat:
            path: /var/run/reboot-required
          register: reboot_file

        - name: Record per-host apt status (success)
          set_fact:
            apt_status:
              host: "{{ inventory_hostname }}"
              section: "{{ _apt_section }}"
              upgraded_line: "{{ (upgrade_result.stdout_lines | default([])) | select('match', '^\\d+ upgraded,') | list | first | default('No changes') }}"
              reboot: "{{ reboot_file.stat.exists | default(false) }}"
              security_count: "{{ (sec_count.stdout | default('0') | trim) | int }}"
              status: "{{ 'warn' if reboot_file.stat.exists | default(false) else 'ok' }}"
              error: ""
      rescue:
        - name: Record per-host apt status (failure)
          set_fact:
            apt_status:
              host: "{{ inventory_hostname }}"
              section: "{{ _apt_section }}"
              upgraded_line: ""
              reboot: false
              security_count: 0
              status: "error"
              error: "{{ (ansible_failed_result.msg | default('task failed'))[:160] }}"
  vars:
    _apt_section: >-
      {%- if inventory_hostname in groups['pve_nodes'] -%}pve_nodes
      {%- elif inventory_hostname in groups['pbs_servers'] -%}pbs_servers
      {%- elif inventory_hostname in groups['ubuntu_vms'] -%}ubuntu_vms
      {%- elif inventory_hostname in groups['workstations'] | default([]) -%}workstations
      {%- else -%}other
      {%- endif -%}

- name: Apply system updates (LXC containers via pct exec)
  hosts: lxc_containers
  gather_facts: false
  any_errors_fatal: false
  max_fail_percentage: 100
  tasks:
    - block:
        - name: Run apt update and upgrade in container
          delegate_to: "{{ pve_host }}"
          become: false
          vars:
            ansible_user: root
          ansible.builtin.shell: |
            pct exec {{ pve_vmid }} -- bash -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get upgrade -y 2>&1 | tail -20
              apt-get autoremove -y -qq
              if [ -f /var/run/reboot-required ]; then echo REBOOT=1; else echo REBOOT=0; fi
            '
          register: lxc_result

        - name: Record per-host apt status (success)
          set_fact:
            apt_status:
              host: "{{ inventory_hostname }}"
              section: "lxc_containers"
              upgraded_line: "{{ (lxc_result.stdout_lines | default([])) | select('match', '^\\d+ upgraded,') | list | first | default('No changes') }}"
              reboot: "{{ 'REBOOT=1' in (lxc_result.stdout | default('')) }}"
              security_count: 0
              status: "{{ 'warn' if 'REBOOT=1' in (lxc_result.stdout | default('')) else 'ok' }}"
              error: ""
      rescue:
        - name: Record per-host apt status (failure)
          set_fact:
            apt_status:
              host: "{{ inventory_hostname }}"
              section: "lxc_containers"
              upgraded_line: ""
              reboot: false
              security_count: 0
              status: "error"
              error: "{{ (ansible_failed_result.msg | default('pct exec failed'))[:160] }}"

- name: Post apt-update summary to bulletin board
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    # Override inventory-wide ansible_become=true (semaphore container has no sudo)
    ansible_become: false
    run_iso: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
    run_date: "{{ lookup('pipe', 'date -u +%Y-%m-%d') }}"
    run_hm: "{{ lookup('pipe', 'date -u +%H:%M') }}"
    bulletin_api_url: "{{ lookup('env', 'BULLETIN_API_URL') | default('https://bulletin.isnadboy.com/api/post', true) }}"
    bulletin_api_key: "{{ lookup('env', 'BULLETIN_API_KEY') | default('', true) }}"
    semaphore_url: "{{ lookup('env', 'SEMAPHORE_URL') | default('https://semaphore.isnadboy.com', true) }}"
    semaphore_project_id: "{{ lookup('env', 'SEMAPHORE_PROJECT_ID') | default('1', true) }}"
    semaphore_link: "{{ semaphore_url }}/project/{{ semaphore_project_id }}"
    reporting_hosts: "{{ (groups['apt_hosts'] | default([])) + (groups['lxc_containers'] | default([])) }}"
  tasks:
    - name: Collect per-host apt_status facts (where set)
      set_fact:
        summary_items: >-
          {{
            reporting_hosts
            | map('extract', hostvars, 'apt_status')
            | select('defined')
            | list
          }}

    - name: Identify hosts with no apt_status (unreachable)
      set_fact:
        unreachable_hosts: >-
          {{
            reporting_hosts
            | reject('in', (summary_items | map(attribute='host') | list))
            | list
          }}

    - name: Synthesise entries for unreachable hosts
      set_fact:
        summary_items: "{{ summary_items + [_u] }}"
      vars:
        _section: >-
          {%- if item in (groups['pve_nodes'] | default([])) -%}pve_nodes
          {%- elif item in (groups['pbs_servers'] | default([])) -%}pbs_servers
          {%- elif item in (groups['ubuntu_vms'] | default([])) -%}ubuntu_vms
          {%- elif item in (groups['workstations'] | default([])) -%}workstations
          {%- elif item in (groups['lxc_containers'] | default([])) -%}lxc_containers
          {%- else -%}other
          {%- endif -%}
        _u:
          host: "{{ item }}"
          section: "{{ _section }}"
          upgraded_line: ""
          reboot: false
          security_count: 0
          status: "error"
          error: "unreachable"
      loop: "{{ unreachable_hosts }}"

    - name: Synthesise entries for managed_locally hosts (unattended-upgrades)
      set_fact:
        summary_items: "{{ summary_items + [_m] }}"
      vars:
        _m:
          host: "{{ item }}"
          section: "managed_locally"
          upgraded_line: "unattended-upgrades (not Ansible-managed)"
          reboot: false
          security_count: 0
          status: "ok"
          error: ""
      loop: "{{ groups['managed_locally'] | default([]) }}"

    - name: Build bulletin items payload
      set_fact:
        bulletin_items: "{{ bulletin_items | default([]) + [_item] }}"
      vars:
        h: "{{ item }}"
        sec_note: "{% if (h.security_count | int) > 0 %} ({{ h.security_count }} security){% endif %}"
        reboot_note: "{% if h.reboot %} · reboot required{% endif %}"
        sub: >-
          {%- if h.status == 'error' -%}error: {{ h.error }}
          {%- elif h.upgraded_line in ['', 'No changes'] -%}no changes{{ reboot_note }}
          {%- else -%}{{ h.upgraded_line }}{{ sec_note }}{{ reboot_note }}
          {%- endif -%}
        _item:
          title: "{{ h.host }}"
          subtitle: "{{ sub }}"
          section: "{{ h.section }}"
          status: "{{ h.status }}"
      loop: "{{ summary_items }}"

    - name: Compute aggregate stats
      set_fact:
        total_hosts: "{{ summary_items | length }}"
        error_hosts: "{{ summary_items | selectattr('status', 'eq', 'error') | list | length }}"
        reboot_hosts: "{{ summary_items | selectattr('reboot', 'equalto', true) | list | length }}"
        clean_hosts: "{{ summary_items | selectattr('status', 'eq', 'ok') | list | length }}"
        total_security: "{{ summary_items | map(attribute='security_count') | map('int') | sum }}"

    - name: Pick embed color by severity
      set_fact:
        overall_color: >-
          {%- if (error_hosts | int) > 0 -%}15158332
          {%- elif (reboot_hosts | int) > 0 -%}15105570
          {%- else -%}3066993
          {%- endif -%}

    - name: POST apt-update summary to bulletin
      uri:
        url: "{{ bulletin_api_url }}"
        method: POST
        headers:
          X-API-Key: "{{ bulletin_api_key }}"
          Content-Type: application/json
        body_format: json
        status_code: [200, 201]
        body:
          source: ansible
          topic: apt-update
          embed:
            title: "apt-update · {{ run_date }} {{ run_hm }}"
            description: |-
              [View in Semaphore]({{ semaphore_link }})

              {{ total_hosts }} hosts · **{{ clean_hosts }}** clean · **{{ reboot_hosts }}** need reboot · **{{ error_hosts }}** errors{% if (total_security | int) > 0 %} · **{{ total_security }}** pending security pkgs{% endif %}
            color: "{{ overall_color | int }}"
            footer:
              text: "Ansible · Semaphore · dist-upgrade (security + regular) · {{ run_iso }}"
            items: "{{ bulletin_items }}"
      when: bulletin_api_key | length > 0
      register: bulletin_post_result

    - name: Warn if bulletin API key missing
      debug:
        msg: "BULLETIN_API_KEY not set — summary not posted to bulletin board"
      when: bulletin_api_key | length == 0

    - name: Display bulletin post outcome
      debug:
        msg: "Posted {{ total_hosts }} hosts to bulletin ({{ clean_hosts }} clean, {{ reboot_hosts }} reboot, {{ error_hosts }} error)"
      when: bulletin_api_key | length > 0
