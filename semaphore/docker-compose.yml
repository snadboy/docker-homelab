services:
  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    labels:
      - "snadboy.revp.3002.domain=semaphore.isnadboy.com"
    environment:
      - SEMAPHORE_DB_DIALECT=bolt
      - SEMAPHORE_ADMIN=admin
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHORE_ADMIN_PASSWORD:-changeme}
      - SEMAPHORE_ADMIN_NAME=Admin
      - SEMAPHORE_ADMIN_EMAIL=admin@localhost
      - SEMAPHORE_PLAYBOOK_PATH=/etc/semaphore
      - SEMAPHORE_ACCESS_KEY_ENCRYPTION=${SEMAPHORE_ENCRYPTION_KEY:-}
      # Passed through to ansible playbooks
      - BULLETIN_API_URL=${BULLETIN_API_URL:-https://bulletin.isnadboy.com/api/post}
      - BULLETIN_API_KEY=${BULLETIN_API_KEY:-}
      # Beszel hub credentials (consumed by ansible/roles/beszel-agent)
      - BESZEL_AGENT_KEY=${BESZEL_AGENT_KEY:-}
      - BESZEL_AGENT_TOKEN=${BESZEL_AGENT_TOKEN:-}
      # Technitium API admin token (consumed by ansible/playbooks/technitium-update.yml)
      - TECHNITIUM_TOKEN=${TECHNITIUM_TOKEN:-}
    volumes:
      - semaphore-data:/etc/semaphore
    ports:
      - 3002:3000
    restart: unless-stopped

volumes:
  semaphore-data:
    external: true
