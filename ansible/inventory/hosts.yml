all:
  children:
    ts_advertisers:
      # Tailscale Services static-serve advertisers (HA). Managed by role ts-static-serves.
      hosts:
        tsvc-able:
          ansible_host: 100.82.38.74
          ansible_user: snadboy
        tsvc-baker:
          ansible_host: 100.90.120.109
          ansible_user: snadboy
    pve_nodes:
      # Renamed 2026-07: colossus/guardian/multivac -> euler/gauss/maxwell.
      # All three active (former multivac Raptor-Lake dormancy no longer applies).
      hosts:
        pve-euler.swallow-spectrum.ts.net:
          ansible_user: root
        pve-gauss.swallow-spectrum.ts.net:
          ansible_user: root
        pve-maxwell.swallow-spectrum.ts.net:
          ansible_user: root
    pbs_servers:
      hosts:
        pbs-svalbard.swallow-spectrum.ts.net:
          ansible_user: root
        pbs-alexandria.swallow-spectrum.ts.net:
          ansible_user: root
    ubuntu_vms:
      hosts:
        arr.swallow-spectrum.ts.net:
          ansible_user: snadboy
        fetch.swallow-spectrum.ts.net:
          ansible_user: snadboy
        bedrock.swallow-spectrum.ts.net:
          ansible_user: snadboy
    workstations:
      # Physical / bare-metal Ubuntu hosts managed exclusively by Ansible
      # (unattended-upgrades disabled on these).
      hosts:
        sdevs.swallow-spectrum.ts.net:
          ansible_user: snadboy
    managed_locally:
      # Hosts excluded from apt_hosts — updates handled by unattended-upgrades
      # or another external mechanism. Tracked here for visibility.
      hosts:
        utilities.swallow-spectrum.ts.net:
          ansible_user: snadboy
          # utilities runs Semaphore itself; can't reliably SSH to self from
          # inside the container, and unattended-upgrades already patches it.
    lxc_containers:
      # Managed via pct exec delegated to parent PVE node (no SSH).
      # Node mapping updated 2026-07 (see pct list per node).
      hosts:
        ns:
          pve_host: pve-euler.swallow-spectrum.ts.net
          pve_vmid: 103
        ns-secundus:
          pve_host: pve-maxwell.swallow-spectrum.ts.net
          pve_vmid: 108
        ns-tertius:
          pve_host: pve-gauss.swallow-spectrum.ts.net
          pve_vmid: 112
        plex-lxc:
          pve_host: pve-euler.swallow-spectrum.ts.net
          pve_vmid: 107
        # pve-scripts-local (was CT 104@colossus) — no longer exists; removed.
    apt_hosts:
      children:
        pve_nodes:
        pbs_servers:
        ubuntu_vms:
        workstations:
    dockhand_agents:
      # Hosts running the Hawser agent (Docker socket proxy for Dockhand).
      # Update flow lives in playbooks/dockhand-update.yml and uses
      # SSH for non-LXC hosts, pct exec for plex-lxc.
      # (pve-colossus dropped 2026-07 — PVE nodes run no Docker/Hawser.)
      hosts:
        arr.swallow-spectrum.ts.net:
        fetch.swallow-spectrum.ts.net:
        bedrock.swallow-spectrum.ts.net:
        plex-lxc:
    dockhand_server:
      # The Dockhand controller (compose stack on utilities). Single host,
      # updated via community.docker.docker_compose_v2 in the same
      # playbook as the hawser agents.
      hosts:
        utilities.swallow-spectrum.ts.net:
          ansible_user: snadboy
  vars:
    ansible_become: true
    ansible_become_method: sudo
