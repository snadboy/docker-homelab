services:
  agregarr:
    image: agregarr/agregarr:latest
    container_name: agregarr
    labels:
      - "snadboy.revp.7171.domain=agregarr.isnadboy.com"
      - "docktail.service.enable=true"
      - "docktail.service.name=agregarr"
      - "docktail.service.port=7171"
      - "docktail.service.service-port=443"
    volumes:
      - agregarr-data:/app/config
      - /mnt/media/TV Shows:/tv:rw
      - /mnt/media/Movies:/movies:rw
    ports:
      - 7171:7171
    restart: unless-stopped

volumes:
  agregarr-data:
    external: true
